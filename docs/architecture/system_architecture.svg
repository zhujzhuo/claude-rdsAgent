  <text x="840" y="218" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">TaskService</text>
  <text x="840" y="233" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">AlertService</text>
  <text x="840" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">HistoryService</text>

