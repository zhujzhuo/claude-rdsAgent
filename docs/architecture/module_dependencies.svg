<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="850" height="600">
  <!-- Title -->
  <text x="425" y="20" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="#1565C0">RDS Agent 模块依赖关系图 (Django + Celery)</text>

  <!-- rds_agent (root) -->
  <rect x="330" y="40" width="140" height="50" fill="#fff" stroke="#333" stroke-width="2" rx="8"/>
  <rect x="330" y="40" width="140" height="18" fill="#1565C0" rx="8"/>
  <text x="400" y="54" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="12" fill="#fff">rds_agent</text>
  <text x="400" y="75" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">__init__.py</text>
  <text x="400" y="88" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">main.py / cli.py</text>

  <!-- utils -->
  <rect x="700" y="40" width="110" height="50" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="700" y="40" width="110" height="18" fill="#607D8B" rx="5"/>
  <text x="755" y="54" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">utils</text>
  <text x="755" y="75" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">config.py</text>
  <text x="755" y="88" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">logger.py</text>

  <!-- django_project -->
  <rect x="30" y="120" width="130" height="60" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="30" y="120" width="130" height="18" fill="#3F51B5" rx="5"/>
  <text x="95" y="134" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">django_project</text>
  <text x="95" y="155" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">settings.py</text>
  <text x="95" y="168" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">urls.py / celery.py</text>

  <!-- scheduler -->
  <rect x="180" y="120" width="180" height="120" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="180" y="120" width="180" height="18" fill="#00BCD4" rx="5"/>
  <text x="270" y="134" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">scheduler</text>

  <text x="195" y="155" font-family="Arial" font-weight="bold" font-size="9" fill="#333">models/ (Django ORM)</text>
  <text x="195" y="168" font-family="Arial" font-size="8" fill="#666">task | execution | alert</text>
  <text x="195" y="181" font-family="Arial" font-size="8" fill="#666">history | notification</text>

  <text x="195" y="198" font-family="Arial" font-weight="bold" font-size="9" fill="#333">api/ (DRF)</text>
  <text x="195" y="211" font-family="Arial" font-size="8" fill="#666">views | serializers</text>

  <text x="195" y="228" font-family="Arial" font-weight="bold" font-size="9" fill="#333">tasks/ (Celery)</text>
  <text x="195" y="241" font-family="Arial" font-size="8" fill="#666">inspection | notification</text>

  <text x="195" y="258" font-family="Arial" font-weight="bold" font-size="9" fill="#333">services/</text>
  <text x="195" y="271" font-family="Arial" font-size="8" fill="#666">task | alert | history</text>

  <!-- diagnostic -->
  <rect x="380" y="120" width="130" height="110" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="380" y="120" width="130" height="18" fill="#9C27B0" rx="5"/>
  <text x="445" y="134" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">diagnostic</text>
  <text x="395" y="155" font-family="Arial" font-size="9" fill="#333">agent.py (LangGraph)</text>
  <text x="395" y="168" font-family="Arial" font-size="9" fill="#333">state.py</text>
  <text x="395" y="181" font-family="Arial" font-size="9" fill="#333">nodes.py</text>
  <text x="395" y="194" font-family="Arial" font-size="9" fill="#333">checks.py (13项)</text>
  <text x="395" y="207" font-family="Arial" font-size="9" fill="#333">report_generator.py</text>
  <text x="395" y="220" font-family="Arial" font-size="9" fill="#333">parameter_optimizer.py</text>

  <!-- core -->
  <rect x="530" y="120" width="130" height="80" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="530" y="120" width="130" height="18" fill="#E91E63" rx="5"/>
  <text x="595" y="134" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">core</text>
  <text x="545" y="155" font-family="Arial" font-size="9" fill="#333">agent.py (LangGraph)</text>
  <text x="545" y="168" font-family="Arial" font-size="9" fill="#333">state.py</text>
  <text x="545" y="181" font-family="Arial" font-size="9" fill="#333">nodes.py</text>
  <text x="545" y="194" font-family="Arial" font-size="9" fill="#333">prompts.py</text>

  <!-- tools -->
  <rect x="30" y="280" width="280" height="60" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="30" y="280" width="280" height="18" fill="#4CAF50" rx="5"/>
