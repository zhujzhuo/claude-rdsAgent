  <text x="515" y="595" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">直连数据库诊断</text>

  <rect x="610" y="565" width="150" height="40" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
