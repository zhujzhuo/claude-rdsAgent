  <line x1="400" y1="90" x2="95" y2="120" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="400" y1="90" x2="270" y2="120" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="400" y1="90" x2="445" y2="120" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
