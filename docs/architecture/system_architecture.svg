  <rect x="370" y="665" width="180" height="40" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
  <text x="460" y="680" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="12" fill="#E91E63">Hermes 3</text>
