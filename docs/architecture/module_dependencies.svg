  <text x="545" y="315" font-family="Arial" font-size="9" fill="#333">django-celery-beat</text>
  <text x="545" y="328" font-family="Arial" font-size="9" fill="#333">PeriodicTask Scheduler</text>

  <!-- Notification Channels -->
  <rect x="700" y="280" width="110" height="60" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="700" y="280" width="110" height="18" fill="#795548" rx="5"/>
  <text x="755" y="294" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">Notifications</text>
