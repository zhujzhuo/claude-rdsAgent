<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="950" height="680">
  <!-- Title -->
  <text x="475" y="25" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="#0D47A1">RDS Agent 系统架构图 (Django + Celery)</text>

  <!-- Layer 1: 用户交互层 -->
  <rect x="50" y="50" width="850" height="80" fill="#f5f5f5" stroke="#333" stroke-width="2" rx="5"/>
  <text x="70" y="70" font-family="Arial" font-weight="bold" font-size="14" fill="#1565C0">用户交互层</text>

  <rect x="100" y="80" width="100" height="40" fill="#fff" stroke="#666" stroke-width="1" rx="5"/>
  <text x="150" y="100" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#2196F3">CLI</text>
  <text x="150" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">命令行界面</text>

  <rect x="220" y="80" width="150" height="40" fill="#fff" stroke="#666" stroke-width="1" rx="5"/>
  <text x="295" y="100" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#2196F3">Django REST API</text>
  <text x="295" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">任务/告警/历史管理</text>

  <rect x="390" y="80" width="130" height="40" fill="#fff" stroke="#666" stroke-width="1" rx="5"/>
  <text x="455" y="100" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#2196F3">Celery Beat</text>
  <text x="455" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">定时调度触发</text>

  <rect x="540" y="80" width="130" height="40" fill="#fff" stroke="#666" stroke-width="1" rx="5"/>
  <text x="605" y="100" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#2196F3">Celery Worker</text>
  <text x="605" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">任务执行</text>

  <rect x="690" y="80" width="150" height="40" fill="#fff" stroke="#666" stroke-width="1" rx="5"/>
  <text x="765" y="100" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#2196F3">Notification</text>
  <text x="765" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">DingTalk/Email/WeChat</text>

  <!-- Layer 2: Agent核心层 -->
  <rect x="50" y="150" width="400" height="130" fill="#e3f2fd" stroke="#333" stroke-width="2" rx="5"/>
  <text x="70" y="170" font-family="Arial" font-weight="bold" font-size="14" fill="#1565C0">Agent核心层 (LangGraph)</text>

  <!-- Q&A Agent -->
  <rect x="80" y="185" width="170" height="80" fill="#fff" stroke="#666" stroke-width="1" rx="5"/>
  <rect x="80" y="185" width="170" height="18" fill="#E91E63" rx="5"/>
  <text x="165" y="198" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">问答Agent</text>
  <text x="165" y="218" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">意图识别</text>
  <text x="165" y="233" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">工具执行</text>
  <text x="165" y="248" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">响应生成</text>

