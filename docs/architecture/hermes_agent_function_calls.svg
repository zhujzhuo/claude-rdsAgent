<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="850">
  <defs>
    <marker id="fcArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="fcArrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4CAF50"/>
    </marker>
    <marker id="fcArrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E91E63"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="28" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="18" fill="#0D47A1">Hermes Agent 函数调用流程图 (RDS Agent)</text>
  <text x="550" y="48" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Function Calling 自动工具调用循环</text>

  <!-- ========== Step 1: User Input ========== -->
  <rect x="420" y="65" width="260" height="50" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="8"/>
  <rect x="420" y="65" width="260" height="16" fill="#1976D2" rx="8"/>
  <text x="550" y="77" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">1. 用户输入</text>
  <text x="550" y="98" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">HermesAgent.chat(message)</text>

  <!-- ========== Step 2: Build Messages ========== -->
  <rect x="380" y="140" width="340" height="55" fill="#fff" stroke="#1976D2" stroke-width="1" rx="5"/>
  <rect x="380" y="140" width="340" height="16" fill="#2196F3" rx="5"/>
  <text x="550" y="152" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">2. 构建请求 (HermesAgent._build_messages)</text>
  <text x="550" y="172" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">system prompt + user message + tools 定义</text>
  <text x="550" y="186" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">ToolRegistry.get_schemas() → OpenAI function 格式</text>

  <!-- Arrow -->
  <line x1="550" y1="115" x2="550" y2="140" stroke="#555" stroke-width="2" marker-end="url(#fcArrow)"/>

  <!-- ========== Step 3: LLM API Call ========== -->
  <rect x="380" y="220" width="340" height="55" fill="#FCE4EC" stroke="#E91E63" stroke-width="2" rx="5"/>
  <rect x="380" y="220" width="340" height="16" fill="#E91E63" rx="5"/>
  <text x="550" y="232" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">3. LLM 调用 (HermesClient.chat_with_functions)</text>
  <text x="550" y="252" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">POST /api/chat → Ollama (Hermes 3)</text>
  <text x="550" y="266" text-anchor="middle" font-family="Arial" font-size="9" fill="#C2185B">OpenAI 兼容格式: messages + tools</text>

  <!-- Arrow -->
  <line x1="550" y1="195" x2="550" y2="220" stroke="#E91E63" stroke-width="2" marker-end="url(#fcArrowRed)"/>

  <!-- ========== Decision: Has Tool Calls? ========== -->
  <polygon points="550,300 680,350 550,400 420,350" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="550" y="348" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#333">4. tool_calls?</text>
  <text x="550" y="365" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">检查响应中的工具调用</text>

  <!-- Arrow -->
  <line x1="550" y1="275" x2="550" y2="300" stroke="#555" stroke-width="2" marker-end="url(#fcArrow)"/>

  <!-- ========== YES: Execute Tool Calls ========== -->
  <!-- Left branch: Yes -->
  <line x1="420" y1="350" x2="200" y2="350" stroke="#4CAF50" stroke-width="2" marker-end="url(#fcArrowGreen)"/>
  <text x="310" y="342" font-family="Arial" font-weight="bold" font-size="10" fill="#4CAF50">是</text>

  <rect x="50" y="320" width="310" height="65" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="5"/>
  <rect x="50" y="320" width="310" height="16" fill="#4CAF50" rx="5"/>
  <text x="205" y="332" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">5. 执行工具调用</text>
  <text x="205" y="352" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">ToolRegistry.execute(tool_name, arguments)</text>
  <text x="205" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#4CAF50">遍历 response.tool_calls 逐个执行</text>

  <!-- Tool Execution Details -->
  <rect x="50" y="405" width="310" height="145" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1" rx="5"/>
  <text x="70" y="425" font-family="Arial" font-weight="bold" font-size="10" fill="#7B1FA2">工具执行详情:</text>

  <rect x="65" y="435" width="130" height="30" fill="#fff" stroke="#666" stroke-width="1" rx="2"/>
  <text x="130" y="450" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">get_instance_info</text>
  <text x="130" y="462" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">实例信息</text>

  <rect x="205" y="435" width="140" height="30" fill="#fff" stroke="#666" stroke-width="1" rx="2"/>
  <text x="275" y="450" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">get_monitoring_data</text>
  <text x="275" y="462" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">性能监控</text>

  <rect x="65" y="470" width="130" height="30" fill="#fff" stroke="#666" stroke-width="1" rx="2"/>
  <text x="130" y="485" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">get_slow_queries</text>
  <text x="130" y="497" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">慢SQL</text>

  <rect x="205" y="470" width="140" height="30" fill="#fff" stroke="#666" stroke-width="1" rx="2"/>
  <text x="275" y="485" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">analyze_sql_plan</text>
  <text x="275" y="497" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">执行计划</text>

  <rect x="65" y="505" width="280" height="30" fill="#fff" stroke="#666" stroke-width="1" rx="2"/>
  <text x="205" y="520" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">+ check_connection / check_lock / get_storage / search_knowledge / ...</text>

  <!-- Arrow from tool execution down -->
  <line x1="205" y1="385" x2="205" y2="405" stroke="#4CAF50" stroke-width="2" marker-end="url(#fcArrowGreen)"/>

  <!-- Step 6: Append tool results -->
  <rect x="50" y="570" width="310" height="55" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
  <rect x="50" y="570" width="310" height="16" fill="#1976D2" rx="5"/>
  <text x="205" y="582" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">6. 追加工具结果到 messages</text>
  <text x="205" y="602" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">tool_result → messages.append()</text>
  <text x="205" y="617" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976D2">循环回到步骤3 (max_iterations)</text>

  <!-- Arrow down -->
  <line x1="205" y1="550" x2="205" y2="570" stroke="#1976D2" stroke-width="2" marker-end="url(#fcArrow)"/>

  <!-- Loop back arrow -->
  <path d="M 50 595 L 20 595 L 20 250 L 380 250" fill="none" stroke="#9C27B0" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#fcArrow)"/>
  <text x="15" y="420" font-family="Arial" font-size="9" fill="#9C27B0" transform="rotate(-90, 15, 420)">循环调用</text>

  <!-- ========== NO: Final Response ========== -->
  <!-- Right branch: No -->
  <line x1="680" y1="350" x2="740" y2="350" stroke="#2196F3" stroke-width="2" marker-end="url(#fcArrow)"/>
  <text x="710" y="342" font-family="Arial" font-weight="bold" font-size="10" fill="#2196F3">否</text>

  <rect x="740" y="320" width="310" height="65" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="5"/>
  <rect x="740" y="320" width="310" height="16" fill="#4CAF50" rx="5"/>
  <text x="895" y="332" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">7. 知识库搜索 (可选)</text>
  <text x="895" y="352" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">search_knowledge_base(query)</text>
  <text x="895" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#4CAF50">ChromaDB 向量检索 → 补充回答</text>

  <!-- Step 8: Format Response -->
  <rect x="740" y="410" width="310" height="65" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" rx="5"/>
  <rect x="740" y="410" width="310" height="16" fill="#FF9800" rx="5"/>
  <text x="895" y="422" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">8. 格式化响应</text>
  <text x="895" y="442" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">LLM 最终回答 + 知识库参考</text>
  <text x="895" y="457" text-anchor="middle" font-family="Arial" font-size="9" fill="#FF9800">结构化输出 (根因/建议/数据)</text>

  <line x1="895" y1="385" x2="895" y2="410" stroke="#555" stroke-width="2" marker-end="url(#fcArrow)"/>

  <!-- Step 9: Return -->
  <rect x="740" y="505" width="310" height="55" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
  <rect x="740" y="505" width="310" height="16" fill="#1976D2" rx="5"/>
  <text x="895" y="517" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">9. 返回结果</text>
  <text x="895" y="537" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">response: 响应文本</text>
  <text x="895" y="552" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">agent_type: "hermes"</text>

  <line x1="895" y1="475" x2="895" y2="505" stroke="#555" stroke-width="2" marker-end="url(#fcArrow)"/>

  <!-- ========== Example Flow ========== -->
  <rect x="50" y="640" width="1000" height="90" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="5"/>
  <text x="70" y="660" font-family="Arial" font-weight="bold" font-size="12" fill="#333">示例调用流程: "什么是 Buffer Pool？"</text>

  <rect x="70" y="675" width="130" height="40" fill="#E3F2FD" stroke="#1976D2" stroke-width="1" rx="3"/>
  <text x="135" y="692" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">用户: 什么是</text>
  <text x="135" y="705" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Buffer Pool?</text>

  <rect x="215" y="675" width="130" height="40" fill="#FCE4EC" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="280" y="692" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Router: SIMPLE_QA</text>
  <text x="280" y="705" text-anchor="middle" font-family="Arial" font-size="8" fill="#C2185B">→ HermesAgent</text>

  <rect x="360" y="675" width="130" height="40" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="3"/>
  <text x="425" y="692" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Hermes: 调用</text>
  <text x="425" y="705" text-anchor="middle" font-family="Arial" font-size="8" fill="#4CAF50">search_knowledge</text>

  <rect x="505" y="675" width="130" height="40" fill="#fff" stroke="#9C27B0" stroke-width="1" rx="3"/>
  <text x="570" y="692" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">获取: 架构/性能</text>
  <text x="570" y="705" text-anchor="middle" font-family="Arial" font-size="8" fill="#9C27B0">知识库内容</text>

  <rect x="650" y="675" width="130" height="40" fill="#fff" stroke="#FF9800" stroke-width="1" rx="3"/>
  <text x="715" y="692" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">LLM: 生成</text>
  <text x="715" y="705" text-anchor="middle" font-family="Arial" font-size="8" fill="#FF9800">结构化回答</text>

  <rect x="795" y="675" width="130" height="40" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1" rx="3"/>
  <text x="860" y="692" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">返回: Buffer Pool</text>
  <text x="860" y="705" text-anchor="middle" font-family="Arial" font-size="8" fill="#4CAF50">详细解释</text>

  <!-- Example flow arrows -->
  <line x1="200" y1="695" x2="215" y2="695" stroke="#1976D2" stroke-width="1" marker-end="url(#fcArrow)"/>
  <line x1="345" y1="695" x2="360" y2="695" stroke="#E91E63" stroke-width="1" marker-end="url(#fcArrow)"/>
  <line x1="490" y1="695" x2="505" y2="695" stroke="#4CAF50" stroke-width="1" marker-end="url(#fcArrow)"/>
  <line x1="635" y1="695" x2="650" y2="695" stroke="#9C27B0" stroke-width="1" marker-end="url(#fcArrow)"/>
  <line x1="780" y1="695" x2="795" y2="695" stroke="#FF9800" stroke-width="1" marker-end="url(#fcArrow)"/>

  <!-- ========== Configuration ========== -->
  <rect x="50" y="750" width="1000" height="50" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1" rx="5"/>
  <text x="70" y="770" font-family="Arial" font-weight="bold" font-size="11" fill="#2E7D32">关键参数:</text>

  <rect x="170" y="758" width="130" height="20" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="2"/>
  <text x="235" y="772" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">max_iterations=10</text>

  <rect x="310" y="758" width="110" height="20" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="2"/>
  <text x="365" y="772" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">timeout=60.0s</text>

  <rect x="430" y="758" width="140" height="20" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="2"/>
  <text x="500" y="772" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">model=hermes3 (Ollama)</text>

  <rect x="580" y="758" width="160" height="20" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="2"/>
  <text x="660" y="772" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">format=openai-function-calling</text>

  <rect x="750" y="758" width="130" height="20" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="2"/>
  <text x="815" y="772" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">8 RDS tools registered</text>

  <!-- ========== Legend ========== -->
  <rect x="50" y="810" width="1000" height="30" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="3"/>
  <rect x="70" y="817" width="12" height="12" fill="#1976D2" rx="2"/>
  <text x="85" y="827" font-family="Arial" font-size="9" fill="#333">构建/返回</text>
  <rect x="160" y="817" width="12" height="12" fill="#E91E63" rx="2"/>
  <text x="175" y="827" font-family="Arial" font-size="9" fill="#333">LLM调用</text>
  <rect x="240" y="817" width="12" height="12" fill="#4CAF50" rx="2"/>
  <text x="255" y="827" font-family="Arial" font-size="9" fill="#333">工具执行</text>
  <rect x="320" y="817" width="12" height="12" fill="#FF9800" rx="2"/>
  <text x="335" y="827" font-family="Arial" font-size="9" fill="#333">决策点</text>
  <rect x="400" y="817" width="12" height="12" fill="#9C27B0" rx="2"/>
  <text x="415" y="827" font-family="Arial" font-size="9" fill="#333">循环</text>
  <text x="980" y="827" text-anchor="end" font-family="Arial" font-size="9" fill="#666">RDS Agent Hermes Function Calling Flow v0.2.0</text>
</svg>
