  <text x="350" y="225" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#7B1FA2">诊断Agent</text>
  <text x="350" y="240" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">13项检查</text>
  <text x="350" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">报告生成</text>
  <text x="350" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">参数优化</text>

