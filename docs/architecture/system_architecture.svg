  <text x="705" y="218" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">run_inspection</text>
  <text x="705" y="233" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">check_alerts</text>
  <text x="705" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">send_notification</text>

