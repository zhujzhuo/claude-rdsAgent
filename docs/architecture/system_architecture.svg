  <text x="465" y="370" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#00BCD4">Services</text>
  <text x="465" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">4个服务</text>

