  <line x1="445" y1="230" x2="170" y2="280" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="595" y1="200" x2="170" y2="280" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>

  <line x1="605" y1="340" x2="270" y2="240" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="755" y1="340" x2="270" y2="240" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>

