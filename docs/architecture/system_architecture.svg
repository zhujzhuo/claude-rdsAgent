  <text x="790" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">FunctionSchema</text>
  <text x="790" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Handler执行</text>

