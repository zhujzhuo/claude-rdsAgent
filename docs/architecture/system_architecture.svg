  <!-- CLI -->
  <rect x="100" y="88" width="95" height="38" fill="#fff" stroke="#666" stroke-width="1" rx="5"/>
  <text x="147" y="102" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#2196F3">CLI</text>
  <text x="147" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">命令行界面</text>

  <!-- Django REST API -->
  <rect x="210" y="88" width="140" height="38" fill="#fff" stroke="#666" stroke-width="1" rx="5"/>
