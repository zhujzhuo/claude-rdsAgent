<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="750">
  <defs>
    <marker id="arrowHermes" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E91E63"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2196F3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="28" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="#0D47A1">Hermes Agent 架构图 (RDS Agent)</text>
  <text x="550" y="48" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Function Calling Agent - 原生工具调用循环 (hermes/)</text>

  <!-- ========== Router Layer ========== -->
  <rect x="50" y="65" width="1000" height="55" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="5"/>
  <text x="70" y="83" font-family="Arial" font-weight="bold" font-size="12" fill="#2E7D32">路由层</text>
  <rect x="200" y="75" width="160" height="35" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="3"/>
  <text x="280" y="90" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#2E7D32">RouterAgent</text>
  <text x="280" y="103" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">SIMPLE_QA 路由</text>
  <rect x="400" y="75" width="160" height="35" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="3"/>
  <text x="480" y="90" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#2E7D32">QuestionClassifier</text>
  <text x="480" y="103" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">分类: 常识问答</text>
  <!-- Arrow: Classifier -> HermesAgent -->
  <line x1="560" y1="92" x2="630" y2="92" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrowHermes)"/>
  <text x="600" y="88" font-family="Arial" font-size="8" fill="#4CAF50">路由</text>

  <!-- ========== HermesAgent Core ========== -->
  <rect x="630" y="65" width="420" height="55" fill="#FCE4EC" stroke="#E91E63" stroke-width="2" rx="5"/>
  <rect x="640" y="75" width="200" height="35" fill="#E91E63" rx="5"/>
  <text x="740" y="90" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">HermesAgent</text>
  <text x="740" y="103" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">hermes/agent.py</text>
  <rect x="855" y="75" width="185" height="35" fill="#fff" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="947" y="88" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#C2185B">invoke() / stream()</text>
  <text x="947" y="103" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">chat() 自动循环</text>

  <!-- ========== Core Components ========== -->
  <rect x="50" y="140" width="1000" height="200" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" rx="5"/>
  <text x="70" y="160" font-family="Arial" font-weight="bold" font-size="13" fill="#E65100">核心组件 (hermes/)</text>

  <!-- HermesClient -->
  <rect x="70" y="175" width="220" height="150" fill="#fff" stroke="#E91E63" stroke-width="2" rx="5"/>
  <rect x="70" y="175" width="220" height="16" fill="#E91E63" rx="5"/>
  <text x="180" y="187" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">HermesClient</text>
  <text x="180" y="203" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">client.py</text>
  <text x="80" y="222" font-family="Arial" font-size="8" fill="#333">- Ollama API 通信</text>
  <text x="80" y="237" font-family="Arial" font-size="8" fill="#333">- OpenAI 兼容格式</text>
  <text x="80" y="252" font-family="Arial" font-size="8" fill="#333">- chat() 方法</text>
  <text x="80" y="267" font-family="Arial" font-size="8" fill="#333">- chat_with_functions()</text>
  <text x="80" y="282" font-family="Arial" font-size="8" fill="#333">- 流式响应支持</text>
  <text x="80" y="297" font-family="Arial" font-size="8" fill="#333">- 超时/重试处理</text>
  <text x="80" y="312" font-family="Arial" font-size="8" fill="#C2185B">模型: Hermes 3 (Ollama)</text>

  <!-- FunctionSchema / ToolRegistry -->
  <rect x="310" y="175" width="240" height="150" fill="#fff" stroke="#9C27B0" stroke-width="2" rx="5"/>
  <rect x="310" y="175" width="240" height="16" fill="#9C27B0" rx="5"/>
  <text x="430" y="187" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">FunctionSchema + ToolRegistry</text>
  <text x="430" y="203" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">function_schema.py</text>
  <text x="320" y="222" font-family="Arial" font-size="8" fill="#333">- FunctionSchema: 工具描述</text>
  <text x="320" y="237" font-family="Arial" font-size="8" fill="#333">- ToolRegistry: 工具注册表</text>
  <text x="320" y="252" font-family="Arial" font-size="8" fill="#333">- register(): 注册工具</text>
  <text x="320" y="267" font-family="Arial" font-size="8" fill="#333">- get_schemas(): 获取定义</text>
  <text x="320" y="282" font-family="Arial" font-size="8" fill="#333">- execute(): 执行工具</text>
  <text x="320" y="297" font-family="Arial" font-size="8" fill="#333">- OpenAI function 格式</text>
  <text x="320" y="312" font-family="Arial" font-size="8" fill="#7B1FA2">8类 RDS 工具注册</text>

  <!-- RDS Tools Registration -->
  <rect x="570" y="175" width="220" height="150" fill="#fff" stroke="#4CAF50" stroke-width="2" rx="5"/>
  <rect x="570" y="175" width="220" height="16" fill="#4CAF50" rx="5"/>
  <text x="680" y="187" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">RDS 工具注册 (tools.py)</text>
  <text x="580" y="222" font-family="Arial" font-size="8" fill="#333">- get_instance_info</text>
  <text x="580" y="237" font-family="Arial" font-size="8" fill="#333">- get_monitoring_data</text>
  <text x="580" y="252" font-family="Arial" font-size="8" fill="#333">- get_slow_queries</text>
  <text x="580" y="267" font-family="Arial" font-size="8" fill="#333">- analyze_sql_plan</text>
  <text x="580" y="282" font-family="Arial" font-size="8" fill="#333">- check_connection_status</text>
  <text x="580" y="297" font-family="Arial" font-size="8" fill="#333">- check_lock_status</text>
  <text x="580" y="312" font-family="Arial" font-size="8" fill="#4CAF50">+ knowledge/parameters/...</text>

  <!-- Knowledge Search -->
  <rect x="810" y="175" width="220" height="150" fill="#fff" stroke="#2196F3" stroke-width="2" rx="5"/>
  <rect x="810" y="175" width="220" height="16" fill="#2196F3" rx="5"/>
  <text x="920" y="187" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">知识库搜索</text>
  <text x="820" y="222" font-family="Arial" font-size="8" fill="#333">- Vector Store (ChromaDB)</text>
  <text x="820" y="237" font-family="Arial" font-size="8" fill="#333">- Embedding (nomic-embed-text)</text>
  <text x="820" y="252" font-family="Arial" font-size="8" fill="#333">- MySQL 架构知识</text>
  <text x="820" y="267" font-family="Arial" font-size="8" fill="#333">- 性能优化知识</text>
  <text x="820" y="282" font-family="Arial" font-size="8" fill="#333">- 故障排查知识</text>
  <text x="820" y="297" font-family="Arial" font-size="8" fill="#333">- 参数参考知识</text>
  <text x="820" y="312" font-family="Arial" font-size="8" fill="#2196F3">knowledge/mysql/*.md</text>

  <!-- ========== Function Calling Loop ========== -->
  <rect x="50" y="360" width="1000" height="130" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
  <text x="70" y="380" font-family="Arial" font-weight="bold" font-size="13" fill="#1565C0">Function Calling 循环流程</text>

  <!-- Step 1: User Message -->
  <rect x="70" y="395" width="120" height="80" fill="#fff" stroke="#1976D2" stroke-width="1" rx="3"/>
  <rect x="70" y="395" width="120" height="14" fill="#1976D2" rx="3"/>
  <text x="130" y="406" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#fff">1. 用户消息</text>
  <text x="130" y="425" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">构建 messages</text>
  <text x="130" y="440" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">添加 system</text>
  <text x="130" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">+ tools 定义</text>

  <!-- Step 2: LLM Call -->
  <rect x="210" y="395" width="130" height="80" fill="#fff" stroke="#E91E63" stroke-width="1" rx="3"/>
  <rect x="210" y="395" width="130" height="14" fill="#E91E63" rx="3"/>
  <text x="275" y="406" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#fff">2. LLM 调用</text>
  <text x="275" y="425" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">HermesClient</text>
  <text x="275" y="440" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">.chat_with_functions()</text>
  <text x="275" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#C2185B">Ollama API</text>

  <!-- Step 3: Check Tool Calls -->
  <rect x="360" y="395" width="130" height="80" fill="#fff" stroke="#FF9800" stroke-width="1" rx="3"/>
  <rect x="360" y="395" width="130" height="14" fill="#FF9800" rx="3"/>
  <text x="425" y="406" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#fff">3. 工具调用?</text>
  <text x="425" y="425" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">检查 tool_calls</text>
  <text x="425" y="440" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">有 → 执行工具</text>
  <text x="425" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">无 → 返回响应</text>

  <!-- Step 4: Execute Tools -->
  <rect x="510" y="395" width="130" height="80" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="3"/>
  <rect x="510" y="395" width="130" height="14" fill="#4CAF50" rx="3"/>
  <text x="575" y="406" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#fff">4. 执行工具</text>
  <text x="575" y="425" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">ToolRegistry</text>
  <text x="575" y="440" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">.execute()</text>
  <text x="575" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#4CAF50">获取结果</text>

  <!-- Step 5: Append Result -->
  <rect x="660" y="395" width="130" height="80" fill="#fff" stroke="#9C27B0" stroke-width="1" rx="3"/>
  <rect x="660" y="395" width="130" height="14" fill="#9C27B0" rx="3"/>
  <text x="725" y="406" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#fff">5. 追加结果</text>
  <text x="725" y="425" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">tool_result →</text>
  <text x="725" y="440" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">messages</text>
  <text x="725" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#9C27B0">循环回步骤2</text>

  <!-- Step 6: Final Response -->
  <rect x="810" y="395" width="130" height="80" fill="#fff" stroke="#2196F3" stroke-width="1" rx="3"/>
  <rect x="810" y="395" width="130" height="14" fill="#2196F3" rx="3"/>
  <text x="875" y="406" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#fff">6. 最终响应</text>
  <text x="875" y="425" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">返回文本</text>
  <text x="875" y="440" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">+ 知识库参考</text>
  <text x="875" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#2196F3">chat() 返回</text>

  <!-- Loop Arrow -->
  <path d="M 790 435 C 820 480, 600 480, 275 480 L 275 475" fill="none" stroke="#9C27B0" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowBlue)"/>
  <text x="540" y="492" text-anchor="middle" font-family="Arial" font-size="8" fill="#9C27B0">循环调用 (max_iterations=10)</text>

  <!-- Flow Arrows -->
  <line x1="190" y1="435" x2="210" y2="435" stroke="#1976D2" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="340" y1="435" x2="360" y2="435" stroke="#E91E63" stroke-width="2" marker-end="url(#arrowHermes)"/>
  <line x1="490" y1="435" x2="510" y2="435" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="640" y1="435" x2="660" y2="435" stroke="#9C27B0" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="790" y1="435" x2="810" y2="435" stroke="#2196F3" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ========== Data Layer ========== -->
  <rect x="50" y="510" width="1000" height="70" fill="#fff3e0" stroke="#FF9800" stroke-width="2" rx="5"/>
  <text x="70" y="528" font-family="Arial" font-weight="bold" font-size="13" fill="#1565C0">数据访问层 (data/)</text>

  <rect x="100" y="540" width="150" height="32" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
  <text x="175" y="555" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#FF9800">MySQL Client</text>
  <text x="175" y="567" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">直连数据库查询</text>

  <rect x="270" y="540" width="150" height="32" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
  <text x="345" y="555" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#FF9800">Instance Platform</text>
  <text x="345" y="567" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">实例管理平台 API</text>

  <rect x="440" y="540" width="150" height="32" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
  <text x="515" y="555" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#FF9800">Vector Store</text>
  <text x="515" y="567" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">ChromaDB 知识库</text>

  <rect x="610" y="540" width="150" height="32" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
  <text x="685" y="555" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#E91E63">Ollama API</text>
  <text x="685" y="567" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Hermes 3 模型</text>

  <!-- ========== LLM Layer ========== -->
  <rect x="50" y="600" width="1000" height="60" fill="#fce4ec" stroke="#E91E63" stroke-width="2" rx="5"/>
  <text x="70" y="618" font-family="Arial" font-weight="bold" font-size="13" fill="#C2185B">LLM 层 (本地部署)</text>

  <rect x="150" y="630" width="200" height="25" fill="#fff" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="250" y="646" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#C2185B">Hermes 3</text>
  <text x="360" y="646" font-family="Arial" font-size="9" fill="#333">Function Calling 专用</text>

  <rect x="550" y="630" width="200" height="25" fill="#fff" stroke="#9C27B0" stroke-width="1" rx="3"/>
  <text x="650" y="646" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#9C27B0">nomic-embed-text</text>
  <text x="760" y="646" font-family="Arial" font-size="9" fill="#333">知识库向量化</text>

  <!-- ========== Configuration ========== -->
  <rect x="50" y="680" width="1000" height="55" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1" rx="5"/>
  <text x="70" y="698" font-family="Arial" font-weight="bold" font-size="11" fill="#2E7D32">Hermes 配置项</text>

  <rect x="70" y="708" width="130" height="20" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="2"/>
  <text x="135" y="720" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">HERMES_ENABLED=True</text>

  <rect x="210" y="708" width="130" height="20" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="2"/>
  <text x="275" y="720" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">HERMES_MODEL=hermes3</text>

  <rect x="350" y="708" width="140" height="20" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="2"/>
  <text x="420" y="720" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">HERMES_MAX_ITERATIONS=10</text>

  <rect x="500" y="708" width="130" height="20" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="2"/>
  <text x="565" y="720" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">HERMES_TIMEOUT=60.0</text>

  <rect x="640" y="708" width="130" height="20" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="2"/>
  <text x="705" y="720" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">HERMES_HOST=localhost:11434</text>

  <!-- Legend -->
  <rect x="830" y="695" width="200" height="35" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="3"/>
  <rect x="840" y="703" width="10" height="10" fill="#E91E63" rx="2"/>
  <text x="855" y="712" font-family="Arial" font-size="8" fill="#333">Hermes Agent</text>
  <rect x="930" y="703" width="10" height="10" fill="#4CAF50" rx="2"/>
  <text x="945" y="712" font-family="Arial" font-size="8" fill="#333">Tools</text>
  <rect x="840" y="718" width="10" height="10" fill="#2196F3" rx="2"/>
  <text x="855" y="727" font-family="Arial" font-size="8" fill="#333">Knowledge</text>
  <rect x="930" y="718" width="10" height="10" fill="#9C27B0" rx="2"/>
  <text x="945" y="727" font-family="Arial" font-size="8" fill="#333">Function Schema</text>
</svg>
