  <text x="170" y="240" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">意图识别</text>
  <text x="170" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">状态机编排</text>
  <text x="170" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">LangChain Tools</text>

