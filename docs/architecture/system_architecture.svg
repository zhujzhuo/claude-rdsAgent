  <text x="85" y="733" font-family="Arial" font-size="9" fill="#333">LangGraph</text>
  <rect x="150" y="725" width="12" height="12" fill="#E91E63" rx="2"/>
  <text x="165" y="733" font-family="Arial" font-size="9" fill="#333">Hermes</text>
