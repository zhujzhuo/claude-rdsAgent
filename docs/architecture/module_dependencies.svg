<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650">
  <!-- Title -->
  <text x="450" y="20" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="#1565C0">RDS Agent 模块依赖关系图</text>
  <text x="450" y="38" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">(Django + Celery + Hermes)</text>

  <!-- rds_agent (root) -->
  <rect x="350" y="50" width="150" height="50" fill="#fff" stroke="#333" stroke-width="2" rx="8"/>
  <rect x="350" y="50" width="150" height="18" fill="#1565C0" rx="8"/>
  <text x="425" y="64" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="12" fill="#fff">rds_agent</text>
  <text x="425" y="85" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">main.py / cli.py</text>

  <!-- utils -->
  <rect x="750" y="50" width="100" height="50" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="750" y="50" width="100" height="18" fill="#607D8B" rx="5"/>
  <text x="800" y="64" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">utils</text>
  <text x="800" y="85" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">config.py</text>

  <!-- hermes (NEW - highlighted) -->
  <rect x="30" y="130" width="150" height="120" fill="#FCE4EC" stroke="#E91E63" stroke-width="2" rx="5"/>
  <rect x="30" y="130" width="150" height="18" fill="#E91E63" rx="5"/>
  <text x="105" y="144" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">hermes</text>

  <text x="45" y="165" font-family="Arial" font-weight="bold" font-size="9" fill="#333">agent.py</text>
  <text x="45" y="178" font-family="Arial" font-size="8" fill="#666">HermesAgent</text>

  <text x="45" y="195" font-family="Arial" font-weight="bold" font-size="9" fill="#333">client.py</text>
  <text x="45" y="208" font-family="Arial" font-size="8" fill="#666">HermesClient</text>

  <text x="45" y="225" font-family="Arial" font-weight="bold" font-size="9" fill="#333">function_schema.py</text>
  <text x="45" y="238" font-family="Arial" font-size="8" fill="#666">FunctionSchema</text>
  <text x="45" y="251" font-family="Arial" font-size="8" fill="#666">ToolRegistry</text>

  <text x="45" y="268" font-family="Arial" font-weight="bold" font-size="9" fill="#333">tools.py</text>
  <text x="45" y="281" font-family="Arial" font-size="8" fill="#666">8 RDS Tools</text>

  <!-- django_project -->
  <rect x="200" y="130" width="130" height="60" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="200" y="130" width="130" height="18" fill="#3F51B5" rx="5"/>
  <text x="265" y="144" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">django_project</text>
  <text x="215" y="165" font-family="Arial" font-size="9" fill="#333">settings.py</text>
  <text x="215" y="178" font-family="Arial" font-size="9" fill="#333">urls.py / celery.py</text>

  <!-- scheduler -->
  <rect x="350" y="130" width="180" height="120" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="350" y="130" width="180" height="18" fill="#00BCD4" rx="5"/>
  <text x="440" y="144" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">scheduler</text>

  <text x="365" y="165" font-family="Arial" font-weight="bold" font-size="9" fill="#333">models/ (Django ORM)</text>
  <text x="365" y="178" font-family="Arial" font-size="8" fill="#666">task | execution | alert</text>

  <text x="365" y="195" font-family="Arial" font-weight="bold" font-size="9" fill="#333">api/ (DRF)</text>
  <text x="365" y="208" font-family="Arial" font-size="8" fill="#666">views | serializers</text>

  <text x="365" y="225" font-family="Arial" font-weight="bold" font-size="9" fill="#333">tasks/ (Celery)</text>
  <text x="365" y="238" font-family="Arial" font-size="8" fill="#666">inspection | notification</text>

  <text x="365" y="255" font-family="Arial" font-weight="bold" font-size="9" fill="#333">services/</text>
  <text x="365" y="268" font-family="Arial" font-size="8" fill="#666">task | alert | history</text>

  <!-- diagnostic -->
  <rect x="550" y="130" width="130" height="110" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1" rx="5"/>
  <rect x="550" y="130" width="130" height="18" fill="#9C27B0" rx="5"/>
  <text x="615" y="144" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">diagnostic</text>
  <text x="565" y="165" font-family="Arial" font-size="9" fill="#333">agent.py (LangGraph)</text>
  <text x="565" y="178" font-family="Arial" font-size="9" fill="#333">state.py</text>
  <text x="565" y="191" font-family="Arial" font-size="9" fill="#333">nodes.py</text>
  <text x="565" y="204" font-family="Arial" font-size="9" fill="#333">checks.py (13项)</text>
  <text x="565" y="217" font-family="Arial" font-size="9" fill="#333">report_generator.py</text>

  <!-- core -->
  <rect x="700" y="130" width="130" height="80" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1" rx="5"/>
  <rect x="700" y="130" width="130" height="18" fill="#E91E63" rx="5"/>
  <text x="765" y="144" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">core</text>
  <text x="715" y="165" font-family="Arial" font-size="9" fill="#333">agent.py (LangGraph)</text>
  <text x="715" y="178" font-family="Arial" font-size="9" fill="#333">state.py</text>
  <text x="715" y="191" font-family="Arial" font-size="9" fill="#333">nodes.py</text>

  <!-- tools -->
  <rect x="30" y="300" width="280" height="60" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1" rx="5"/>
  <rect x="30" y="300" width="280" height="18" fill="#4CAF50" rx="5"/>
  <text x="170" y="314" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">tools (LangChain / Hermes)</text>
  <text x="170" y="335" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">instance | performance | sql | connection</text>
  <text x="170" y="350" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">storage | parameters | knowledge | diagnostic</text>

  <!-- External Dependencies -->
  <rect x="330" y="300" width="180" height="100" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="330" y="300" width="180" height="18" fill="#FF9800" rx="5"/>
  <text x="420" y="314" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">External Dependencies</text>
  <text x="345" y="335" font-family="Arial" font-size="9" fill="#333">MySQL (Django ORM)</text>
  <text x="345" y="350" font-family="Arial" font-size="9" fill="#333">Redis (Celery Broker)</text>
  <text x="345" y="365" font-family="Arial" font-size="9" fill="#333">Ollama (LLM)</text>
  <text x="345" y="380" font-family="Arial" font-size="9" fill="#E91E63">Hermes 3 (Function Calling)</text>
  <text x="345" y="395" font-family="Arial" font-size="9" fill="#333">ChromaDB (Vector Store)</text>

  <!-- Celery Beat -->
  <rect x="530" y="300" width="150" height="60" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="530" y="300" width="150" height="18" fill="#FF5722" rx="5"/>
  <text x="605" y="314" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">Celery Beat</text>
  <text x="545" y="335" font-family="Arial" font-size="9" fill="#333">django-celery-beat</text>
  <text x="545" y="350" font-family="Arial" font-size="9" fill="#333">PeriodicTask Scheduler</text>

  <!-- Notification Channels -->
  <rect x="700" y="300" width="110" height="60" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="700" y="300" width="110" height="18" fill="#795548" rx="5"/>
  <text x="755" y="314" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">Notifications</text>
  <text x="710" y="335" font-family="Arial" font-size="8" fill="#333">DingTalk</text>
  <text x="710" y="350" font-family="Arial" font-size="8" fill="#333">Email/WeChat/Webhook</text>

  <!-- Dependency Lines -->
  <!-- Hermes connections -->
  <line x1="105" y1="250" x2="170" y2="300" stroke="#E91E63" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="105" y1="250" x2="420" y2="300" stroke="#E91E63" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- LangGraph connections -->
  <line x1="425" y1="100" x2="105" y2="130" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="425" y1="100" x2="265" y2="130" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="425" y1="100" x2="440" y2="130" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="425" y1="100" x2="615" y2="130" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="425" y1="100" x2="765" y2="130" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Tools connections -->
  <line x1="615" y1="240" x2="170" y2="300" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="765" y1="210" x2="170" y2="300" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Legend -->
  <rect x="30" y="420" width="820" height="80" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="5"/>
  <text x="50" y="440" font-family="Arial" font-weight="bold" font-size="11" fill="#333">颜色说明:</text>

  <rect x="50" y="455" width="16" height="12" fill="#E91E63" rx="2"/>
  <text x="70" y="463" font-family="Arial" font-size="10" fill="#333">hermes - Function Calling Agent</text>

  <rect x="200" y="455" width="16" height="12" fill="#9C27B0" rx="2"/>
  <text x="220" y="463" font-family="Arial" font-size="10" fill="#333">LangGraph Agent</text>

  <rect x="320" y="455" width="16" height="12" fill="#00BCD4" rx="2"/>
  <text x="340" y="463" font-family="Arial" font-size="10" fill="#333">scheduler - Django App</text>

  <rect x="450" y="455" width="16" height="12" fill="#3F51B5" rx="2"/>
  <text x="470" y="463" font-family="Arial" font-size="10" fill="#333">django_project</text>

  <rect x="570" y="455" width="16" height="12" fill="#4CAF50" rx="2"/>
  <text x="590" y="463" font-family="Arial" font-size="10" fill="#333">tools - 工具层</text>

  <rect x="690" y="455" width="16" height="12" fill="#FF9800" rx="2"/>
  <text x="710" y="463" font-family="Arial" font-size="10" fill="#333">External</text>

  <text x="800" y="480" text-anchor="end" font-family="Arial" font-size="10" fill="#666">总计: 9个模块 | 60+文件</text>

  <!-- Hermes Flow Section -->
  <rect x="30" y="520" width="820" height="110" fill="#FCE4EC" stroke="#E91E63" stroke-width="1" rx="5"/>
  <text x="50" y="540" font-family="Arial" font-weight="bold" font-size="12" fill="#C2185B">Hermes Function Calling 流程:</text>

  <rect x="70" y="560" width="100" height="60" fill="#fff" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="120" y="575" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#C2185B">1. 用户输入</text>
  <text x="120" y="590" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">自然语言请求</text>

  <rect x="190" y="560" width="100" height="60" fill="#fff" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="240" y="575" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#C2185B">2. 工具决策</text>
  <text x="240" y="590" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Hermes 选择工具</text>

  <rect x="310" y="560" width="100" height="60" fill="#fff" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="360" y="575" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#C2185B">3. 自动执行</text>
  <text x="360" y="590" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">调用 ToolRegistry</text>

  <rect x="430" y="560" width="100" height="60" fill="#fff" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="480" y="575" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#C2185B">4. Handler</text>
  <text x="480" y="590" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">执行工具逻辑</text>

  <rect x="550" y="560" width="100" height="60" fill="#fff" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="600" y="575" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#C2185B">5. 结果回传</text>
  <text x="600" y="590" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">返回 Hermes</text>

  <rect x="670" y="560" width="100" height="60" fill="#fff" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="720" y="575" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#C2185B">6. 生成回复</text>
  <text x="720" y="590" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">自然语言响应</text>

  <!-- Arrows -->
  <line x1="170" y1="590" x2="190" y2="590" stroke="#E91E63" stroke-width="2" marker-end="url(#arrowhermes)"/>
  <line x1="290" y1="590" x2="310" y2="590" stroke="#E91E63" stroke-width="2" marker-end="url(#arrowhermes)"/>
  <line x1="410" y1="590" x2="430" y2="590" stroke="#E91E63" stroke-width="2" marker-end="url(#arrowhermes)"/>
  <line x1="530" y1="590" x2="550" y2="590" stroke="#E91E63" stroke-width="2" marker-end="url(#arrowhermes)"/>
  <line x1="650" y1="590" x2="670" y2="590" stroke="#E91E63" stroke-width="2" marker-end="url(#arrowhermes)"/>

  <defs>
    <marker id="arrowhermes" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E91E63"/>
    </marker>
  </defs>
</svg>