<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650">
  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="18" fill="#0D47A1">调度器模块架构图 (Django + Celery)</text>

  <!-- API Layer - Django REST Framework -->
  <rect x="30" y="50" width="840" height="80" fill="#E8EAF6" stroke="#3F51B5" stroke-width="2" rx="5"/>
  <text x="50" y="70" font-family="Arial" font-weight="bold" font-size="12" fill="#3F51B5">Django REST Framework - API Layer</text>

  <rect x="60" y="85" width="120" height="35" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
  <rect x="60" y="85" width="120" height="16" fill="#3F51B5" rx="3"/>
  <text x="120" y="96" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">InspectionTask</text>
  <text x="120" y="112" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">ViewSet CRUD</text>

  <rect x="200" y="85" width="120" height="35" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
  <rect x="200" y="85" width="120" height="16" fill="#3F51B5" rx="3"/>
  <text x="260" y="96" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">TaskExecution</text>
  <text x="260" y="112" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">ViewSet List</text>

  <rect x="340" y="85" width="120" height="35" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
  <rect x="340" y="85" width="120" height="16" fill="#f44336" rx="3"/>
  <text x="400" y="96" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">AlertRule</text>
  <text x="400" y="112" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">ViewSet CRUD</text>

  <rect x="480" y="85" width="120" height="35" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
  <rect x="480" y="85" width="120" height="16" fill="#f44336" rx="3"/>
  <text x="540" y="96" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">AlertEvent</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">ViewSet List</text>

  <rect x="620" y="85" width="120" height="35" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
  <rect x="620" y="85" width="120" height="16" fill="#4CAF50" rx="3"/>
  <text x="680" y="96" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">HealthHistory</text>
  <text x="680" y="112" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">ViewSet List</text>

  <rect x="760" y="85" width="100" height="35" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
  <rect x="760" y="85" width="100" height="16" fill="#FF9800" rx="3"/>
  <text x="810" y="96" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">Notification</text>
  <text x="810" y="112" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">ViewSet CRUD</text>

  <!-- Celery Tasks Layer -->
  <rect x="30" y="150" width="840" height="90" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" rx="5"/>
  <text x="50" y="170" font-family="Arial" font-weight="bold" font-size="12" fill="#E65100">Celery Tasks Layer</text>

  <rect x="60" y="185" width="180" height="45" fill="#fff" stroke="#FF9800" stroke-width="1" rx="3"/>
  <text x="150" y="200" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#E65100">run_inspection_task</text>
  <text x="150" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">触发巡检任务链</text>

  <rect x="260" y="185" width="180" height="45" fill="#fff" stroke="#FF9800" stroke-width="1" rx="3"/>
  <text x="350" y="200" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#E65100">run_single_inspection</text>
  <text x="350" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">执行单实例诊断</text>

  <rect x="460" y="185" width="180" height="45" fill="#fff" stroke="#FF9800" stroke-width="1" rx="3"/>
  <text x="550" y="200" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#E65100">check_alerts</text>
  <text x="550" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">检查告警规则</text>

  <rect x="660" y="185" width="180" height="45" fill="#fff" stroke="#FF9800" stroke-width="1" rx="3"/>
  <text x="750" y="200" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#E65100">send_notification</text>
  <text x="750" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">发送告警通知</text>

  <!-- Services Layer -->
  <rect x="30" y="260" width="840" height="100" fill="#E0F7FA" stroke="#00BCD4" stroke-width="2" rx="5"/>
  <text x="50" y="280" font-family="Arial" font-weight="bold" font-size="12" fill="#006064">Services Layer</text>

  <rect x="60" y="295" width="190" height="55" fill="#fff" stroke="#00BCD4" stroke-width="1" rx="3"/>
  <text x="155" y="310" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#006064">TaskService</text>
  <text x="155" y="325" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">schedule_task()</text>
  <text x="155" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">run_task_now()</text>

  <rect x="270" y="295" width="190" height="55" fill="#fff" stroke="#00BCD4" stroke-width="1" rx="3"/>
  <text x="365" y="310" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#006064">AlertService</text>
  <text x="365" y="325" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">check_and_trigger_alerts()</text>
  <text x="365" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">_should_trigger_alert()</text>

  <rect x="480" y="295" width="190" height="55" fill="#fff" stroke="#00BCD4" stroke-width="1" rx="3"/>
  <text x="575" y="310" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#006064">HistoryService</text>
  <text x="575" y="325" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">record_health()</text>
  <text x="575" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">get_health_trend()</text>

  <rect x="690" y="295" width="170" height="55" fill="#fff" stroke="#00BCD4" stroke-width="1" rx="3"/>
  <text x="775" y="310" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#006064">NotificationService</text>
  <text x="775" y="325" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">send_to_channels()</text>
  <text x="775" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">test_channel()</text>

  <!-- Django ORM Models -->
  <rect x="30" y="380" width="420" height="120" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="5"/>
  <text x="50" y="400" font-family="Arial" font-weight="bold" font-size="12" fill="#4A148C">Django ORM Models</text>

  <rect x="50" y="415" width="90" height="75" fill="#fff" stroke="#9C27B0" stroke-width="1" rx="3"/>
  <text x="95" y="430" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#4A148C">InspectionTask</text>
  <text x="95" y="445" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">UUIDField id</text>
  <text x="95" y="458" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">JSONField targets</text>
  <text x="95" y="471" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">EnumField status</text>

  <rect x="150" y="415" width="90" height="75" fill="#fff" stroke="#9C27B0" stroke-width="1" rx="3"/>
  <text x="195" y="430" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#4A148C">TaskExecution</text>
  <text x="195" y="445" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">ForeignKey task</text>
  <text x="195" y="458" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">IntegerField score</text>
  <text x="195" y="471" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">JSONField result</text>

  <rect x="250" y="415" width="90" height="75" fill="#fff" stroke="#9C27B0" stroke-width="1" rx="3"/>
  <text x="295" y="430" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#4A148C">AlertRule</text>
  <text x="295" y="445" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CharField metric</text>
  <text x="295" y="458" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">FloatField threshold</text>
  <text x="295" y="471" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">EnumField level</text>

  <rect x="350" y="415" width="90" height="75" fill="#fff" stroke="#9C27B0" stroke-width="1" rx="3"/>
  <text x="395" y="430" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#4A148C">AlertEvent</text>
  <text x="395" y="445" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">ForeignKey rule</text>
  <text x="395" y="458" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CharField title</text>
  <text x="395" y="471" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">EnumField status</text>

  <!-- Celery Beat Scheduler -->
  <rect x="470" y="380" width="400" height="120" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="5"/>
  <text x="490" y="400" font-family="Arial" font-weight="bold" font-size="12" fill="#1B5E20">Celery Beat Scheduler (django-celery-beat)</text>

  <rect x="490" y="415" width="180" height="75" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="3"/>
  <text x="580" y="430" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#1B5E20">PeriodicTask</text>
  <text x="580" y="445" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">name: task_id</text>
  <text x="580" y="458" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">task: run_inspection</text>
  <text x="580" y="471" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">interval/crontab</text>

  <rect x="690" y="415" width="170" height="75" fill="#fff" stroke="#4CAF50" stroke-width="1" rx="3"/>
  <text x="775" y="430" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#1B5E20">Schedule Types</text>
  <text x="775" y="445" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">INTERVAL</text>
  <text x="775" y="458" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CRON</text>
  <text x="775" y="471" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">ONCE (immediate)</text>

  <!-- Notification Channels -->
  <rect x="30" y="520" width="420" height="100" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" rx="5"/>
  <text x="50" y="540" font-family="Arial" font-weight="bold" font-size="12" fill="#E65100">Notification Channels</text>

  <rect x="50" y="555" width="80" height="50" fill="#fff" stroke="#FF9800" stroke-width="1" rx="3"/>
  <text x="90" y="570" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#E65100">DingTalk</text>
  <text x="90" y="585" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">webhook</text>
  <text x="90" y="598" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">secret</text>

  <rect x="140" y="555" width="80" height="50" fill="#fff" stroke="#FF9800" stroke-width="1" rx="3"/>
  <text x="180" y="570" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#E65100">Email</text>
  <text x="180" y="585" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">smtp_host</text>
  <text x="180" y="598" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">recipients</text>

  <rect x="230" y="555" width="80" height="50" fill="#fff" stroke="#FF9800" stroke-width="1" rx="3"/>
  <text x="270" y="570" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#E65100">WeChat</text>
  <text x="270" y="585" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">corp_id</text>
  <text x="270" y="598" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">agent_id</text>

  <rect x="320" y="555" width="120" height="50" fill="#fff" stroke="#FF9800" stroke-width="1" rx="3"/>
  <text x="380" y="570" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#E65100">Webhook</text>
  <text x="380" y="585" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">url</text>
  <text x="380" y="598" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">headers</text>

  <!-- Data Flow -->
  <rect x="470" y="520" width="400" height="100" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
  <text x="490" y="540" font-family="Arial" font-weight="bold" font-size="12" fill="#1565C0">Data Flow</text>

  <rect x="490" y="555" width="70" height="50" fill="#fff" stroke="#1976D2" stroke-width="1" rx="3"/>
  <text x="525" y="570" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#1565C0">1. API</text>
  <text x="525" y="585" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Create Task</text>

  <rect x="570" y="555" width="70" height="50" fill="#fff" stroke="#1976D2" stroke-width="1" rx="3"/>
  <text x="605" y="570" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#1565C0">2. Beat</text>
  <text x="605" y="585" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Schedule</text>

  <rect x="650" y="555" width="70" height="50" fill="#fff" stroke="#1976D2" stroke-width="1" rx="3"/>
  <text x="685" y="570" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#1565C0">3. Worker</text>
  <text x="685" y="585" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Execute</text>

  <rect x="730" y="555" width="70" height="50" fill="#fff" stroke="#1976D2" stroke-width="1" rx="3"/>
  <text x="765" y="570" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#1565C0">4. Agent</text>
  <text x="765" y="585" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Diagnose</text>

  <rect x="800" y="555" width="60" height="50" fill="#fff" stroke="#1976D2" stroke-width="1" rx="3"/>
  <text x="830" y="570" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#1565C0">5. Store</text>
  <text x="830" y="585" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">MySQL</text>

  <!-- Arrows -->
  <line x1="560" y1="580" x2="570" y2="580" stroke="#1976D2" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="640" y1="580" x2="650" y2="580" stroke="#1976D2" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="720" y1="580" x2="730" y2="580" stroke="#1976D2" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="580" x2="800" y2="580" stroke="#1976D2" stroke-width="2"/>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976D2"/>
    </marker>
  </defs>
</svg>