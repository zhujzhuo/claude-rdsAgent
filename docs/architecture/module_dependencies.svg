<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="950" height="720">
  <!-- Title -->
  <text x="475" y="20" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="#1565C0">RDS Agent 模块依赖关系图</text>
  <text x="475" y="38" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">(Django + Celery + Hermes)</text>

  <!-- ========== Top Level ========== -->
  <!-- rds_agent (root) -->
  <rect x="375" y="55" width="140" height="45" fill="#fff" stroke="#333" stroke-width="2" rx="8"/>
  <rect x="375" y="55" width="140" height="16" fill="#1565C0" rx="8"/>
  <text x="445" y="68" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">rds_agent</text>
  <text x="445" y="85" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">main.py / cli.py</text>

  <!-- utils -->
  <rect x="800" y="55" width="100" height="45" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="800" y="55" width="100" height="16" fill="#607D8B" rx="5"/>
  <text x="850" y="68" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">utils</text>
  <text x="850" y="85" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">config.py</text>

  <!-- ========== Module Layer (Row 1) ========== -->
  <!-- hermes -->
  <rect x="50" y="130" width="130" height="115" fill="#FCE4EC" stroke="#E91E63" stroke-width="2" rx="5"/>
  <rect x="50" y="130" width="130" height="16" fill="#E91E63" rx="5"/>
  <text x="115" y="143" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">hermes</text>

  <text x="60" y="160" font-family="Arial" font-weight="bold" font-size="8" fill="#333">agent.py</text>
  <text x="60" y="172" font-family="Arial" font-size="7" fill="#666">HermesAgent</text>

  <text x="60" y="187" font-family="Arial" font-weight="bold" font-size="8" fill="#333">client.py</text>
  <text x="60" y="199" font-family="Arial" font-size="7" fill="#666">HermesClient</text>

  <text x="60" y="214" font-family="Arial" font-weight="bold" font-size="8" fill="#333">function_schema.py</text>
  <text x="60" y="226" font-family="Arial" font-size="7" fill="#666">FunctionSchema</text>
  <text x="60" y="238" font-family="Arial" font-size="7" fill="#666">ToolRegistry</text>

  <!-- django_project -->
  <rect x="200" y="130" width="115" height="55" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="200" y="130" width="115" height="16" fill="#3F51B5" rx="5"/>
  <text x="257" y="143" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">django_project</text>
  <text x="210" y="160" font-family="Arial" font-size="8" fill="#333">settings.py</text>
  <text x="210" y="175" font-family="Arial" font-size="8" fill="#333">urls.py / celery.py</text>

  <!-- scheduler -->
  <rect x="330" y="130" width="155" height="115" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="330" y="130" width="155" height="16" fill="#00BCD4" rx="5"/>
  <text x="407" y="143" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">scheduler</text>

  <text x="340" y="160" font-family="Arial" font-weight="bold" font-size="8" fill="#333">models/ (Django ORM)</text>
  <text x="340" y="172" font-family="Arial" font-size="7" fill="#666">task | execution | alert</text>

  <text x="340" y="187" font-family="Arial" font-weight="bold" font-size="8" fill="#333">api/ (DRF)</text>
  <text x="340" y="199" font-family="Arial" font-size="7" fill="#666">views | serializers</text>

  <text x="340" y="214" font-family="Arial" font-weight="bold" font-size="8" fill="#333">tasks/ (Celery)</text>
  <text x="340" y="226" font-family="Arial" font-size="7" fill="#666">inspection | notification</text>

  <text x="340" y="241" font-family="Arial" font-weight="bold" font-size="8" fill="#333">services/</text>
  <text x="340" y="253" font-family="Arial" font-size="7" fill="#666">task | alert | history</text>

  <!-- diagnostic -->
  <rect x="500" y="130" width="120" height="100" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1" rx="5"/>
  <rect x="500" y="130" width="120" height="16" fill="#9C27B0" rx="5"/>
  <text x="560" y="143" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">diagnostic</text>
  <text x="510" y="160" font-family="Arial" font-size="8" fill="#333">agent.py (LangGraph)</text>
  <text x="510" y="175" font-family="Arial" font-size="8" fill="#333">state.py</text>
  <text x="510" y="190" font-family="Arial" font-size="8" fill="#333">nodes.py</text>
  <text x="510" y="205" font-family="Arial" font-size="8" fill="#333">checks.py (13项)</text>
  <text x="510" y="220" font-family="Arial" font-size="8" fill="#333">report_generator.py</text>

  <!-- core -->
  <rect x="640" y="130" width="110" height="70" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1" rx="5"/>
  <rect x="640" y="130" width="110" height="16" fill="#E91E63" rx="5"/>
  <text x="695" y="143" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">core</text>
  <text x="650" y="160" font-family="Arial" font-size="8" fill="#333">agent.py (LangGraph)</text>
  <text x="650" y="175" font-family="Arial" font-size="8" fill="#333">state.py</text>
  <text x="650" y="190" font-family="Arial" font-size="8" fill="#333">nodes.py</text>

  <!-- ========== Dependency Lines (Top to Modules) ========== -->
  <line x1="445" y1="100" x2="115" y2="130" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="445" y1="100" x2="257" y2="130" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="445" y1="100" x2="407" y2="130" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="445" y1="100" x2="560" y2="130" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="445" y1="100" x2="695" y2="130" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- ========== Lower Layer ========== -->
  <!-- tools -->
  <rect x="50" y="280" width="240" height="55" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1" rx="5"/>
  <rect x="50" y="280" width="240" height="16" fill="#4CAF50" rx="5"/>
  <text x="170" y="293" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">tools (LangChain / Hermes)</text>
  <text x="170" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">instance | performance | sql | connection</text>
  <text x="170" y="325" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">storage | parameters | knowledge | diagnostic</text>

  <!-- External Dependencies -->
  <rect x="310" y="280" width="160" height="90" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="310" y="280" width="160" height="16" fill="#FF9800" rx="5"/>
  <text x="390" y="293" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">External Dependencies</text>
  <text x="320" y="310" font-family="Arial" font-size="8" fill="#333">MySQL (Django ORM)</text>
  <text x="320" y="325" font-family="Arial" font-size="8" fill="#333">Redis (Celery Broker)</text>
  <text x="320" y="340" font-family="Arial" font-size="8" fill="#333">Ollama (LLM)</text>
  <text x="320" y="355" font-family="Arial" font-size="8" fill="#E91E63">Hermes 3 (Function Calling)</text>
  <text x="320" y="370" font-family="Arial" font-size="8" fill="#333">ChromaDB (Vector Store)</text>

  <!-- Celery Beat -->
  <rect x="490" y="280" width="130" height="55" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="490" y="280" width="130" height="16" fill="#FF5722" rx="5"/>
  <text x="555" y="293" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#fff">Celery Beat</text>
  <text x="500" y="310" font-family="Arial" font-size="8" fill="#333">django-celery-beat</text>
  <text x="500" y="325" font-family="Arial" font-size="8" fill="#333">PeriodicTask Scheduler</text>

  <!-- Notification Channels -->
  <rect x="640" y="280" width="100" height="55" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="640" y="280" width="100" height="16" fill="#795548" rx="5"/>
  <text x="690" y="293" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#fff">Notifications</text>
  <text x="650" y="310" font-family="Arial" font-size="7" fill="#333">DingTalk</text>
  <text x="650" y="325" font-family="Arial" font-size="7" fill="#333">Email/WeChat</text>

  <!-- ========== Dependency Lines (Modules to Lower) ========== -->
  <!-- Hermes to tools -->
  <line x1="115" y1="245" x2="170" y2="280" stroke="#E91E63" stroke-width="2" stroke-dasharray="4,2"/>
  <!-- Hermes to External -->
  <line x1="115" y1="245" x2="390" y2="280" stroke="#E91E63" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Diagnostic to tools -->
  <line x1="560" y1="230" x2="170" y2="280" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Core to tools -->
  <line x1="695" y1="200" x2="170" y2="280" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Scheduler to External -->
  <line x1="407" y1="245" x2="390" y2="280" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Scheduler to Celery Beat -->
  <line x1="407" y1="245" x2="555" y2="280" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Scheduler to Notifications -->
  <line x1="407" y1="245" x2="690" y2="280" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- ========== Legend ========== -->
  <rect x="50" y="390" width="700" height="70" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="5"/>
  <text x="70" y="408" font-family="Arial" font-weight="bold" font-size="10" fill="#333">颜色说明:</text>

  <rect x="70" y="420" width="14" height="10" fill="#E91E63" rx="2"/>
  <text x="88" y="428" font-family="Arial" font-size="9" fill="#333">hermes - Function Calling Agent</text>

  <rect x="200" y="420" width="14" height="10" fill="#9C27B0" rx="2"/>
  <text x="218" y="428" font-family="Arial" font-size="9" fill="#333">LangGraph Agent</text>

  <rect x="310" y="420" width="14" height="10" fill="#00BCD4" rx="2"/>
  <text x="328" y="428" font-family="Arial" font-size="9" fill="#333">scheduler - Django App</text>

  <rect x="430" y="420" width="14" height="10" fill="#3F51B5" rx="2"/>
  <text x="448" y="428" font-family="Arial" font-size="9" fill="#333">django_project</text>

  <rect x="530" y="420" width="14" height="10" fill="#4CAF50" rx="2"/>
  <text x="548" y="428" font-family="Arial" font-size="9" fill="#333">tools - 工具层</text>

  <rect x="620" y="420" width="14" height="10" fill="#FF9800" rx="2"/>
  <text x="638" y="428" font-family="Arial" font-size="9" fill="#333">External</text>

  <text x="750" y="455" text-anchor="end" font-family="Arial" font-size="9" fill="#666">总计: 9个模块 | 60+文件</text>

  <!-- ========== Hermes Flow Section ========== -->
  <rect x="50" y="480" width="700" height="100" fill="#FCE4EC" stroke="#E91E63" stroke-width="1" rx="5"/>
  <text x="70" y="498" font-family="Arial" font-weight="bold" font-size="11" fill="#C2185B">Hermes Function Calling 流程:</text>

  <!-- Flow steps -->
  <rect x="70" y="510" width="95" height="55" fill="#fff" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="117" y="523" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="8" fill="#C2185B">1. 用户输入</text>
  <text x="117" y="538" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">自然语言请求</text>

  <rect x="175" y="510" width="95" height="55" fill="#fff" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="222" y="523" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="8" fill="#C2185B">2. 工具决策</text>
  <text x="222" y="538" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Hermes 选择工具</text>

  <rect x="280" y="510" width="95" height="55" fill="#fff" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="327" y="523" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="8" fill="#C2185B">3. 自动执行</text>
  <text x="327" y="538" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">调用 ToolRegistry</text>

  <rect x="385" y="510" width="95" height="55" fill="#fff" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="432" y="523" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="8" fill="#C2185B">4. Handler</text>
  <text x="432" y="538" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">执行工具逻辑</text>

  <rect x="490" y="510" width="95" height="55" fill="#fff" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="537" y="523" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="8" fill="#C2185B">5. 结果回传</text>
  <text x="537" y="538" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">返回 Hermes</text>

  <rect x="595" y="510" width="95" height="55" fill="#fff" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="642" y="523" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="8" fill="#C2185B">6. 生成回复</text>
  <text x="642" y="538" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">自然语言响应</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrowhermes" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E91E63"/>
    </marker>
  </defs>

  <line x1="165" y1="537" x2="175" y2="537" stroke="#E91E63" stroke-width="2" marker-end="url(#arrowhermes)"/>
  <line x1="270" y1="537" x2="280" y2="537" stroke="#E91E63" stroke-width="2" marker-end="url(#arrowhermes)"/>
  <line x1="375" y1="537" x2="385" y2="537" stroke="#E91E63" stroke-width="2" marker-end="url(#arrowhermes)"/>
  <line x1="480" y1="537" x2="490" y2="537" stroke="#E91E63" stroke-width="2" marker-end="url(#arrowhermes)"/>
  <line x1="585" y1="537" x2="595" y2="537" stroke="#E91E63" stroke-width="2" marker-end="url(#arrowhermes)"/>
</svg>