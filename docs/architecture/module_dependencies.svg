  <line x1="150" y1="545" x2="170" y2="545" stroke="#1976D2" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="545" x2="270" y2="545" stroke="#1976D2" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="545" x2="370" y2="545" stroke="#1976D2" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="545" x2="470" y2="545" stroke="#1976D2" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="550" y1="545" x2="570" y2="545" stroke="#1976D2" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="650" y1="545" x2="670" y2="545" stroke="#1976D2" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
