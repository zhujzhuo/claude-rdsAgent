  <text x="170" y="328" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">storage | parameters | knowledge | diagnostic</text>

  <!-- External Dependencies -->
  <rect x="330" y="280" width="180" height="100" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="330" y="280" width="180" height="18" fill="#FF9800" rx="5"/>
  <text x="420" y="294" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">External Dependencies</text>
  <text x="345" y="315" font-family="Arial" font-size="9" fill="#333">MySQL (Django ORM)</text>
  <text x="345" y="328" font-family="Arial" font-size="9" fill="#333">Redis (Celery Broker)</text>
  <text x="345" y="341" font-family="Arial" font-size="9" fill="#333">Ollama (LLM)</text>
  <text x="345" y="354" font-family="Arial" font-size="9" fill="#333">ChromaDB (Vector Store)</text>
  <text x="345" y="367" font-family="Arial" font-size="9" fill="#333">Platform API</text>

  <!-- Celery Beat -->
  <rect x="530" y="280" width="150" height="60" fill="#fff" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="530" y="280" width="150" height="18" fill="#FF5722" rx="5"/>
