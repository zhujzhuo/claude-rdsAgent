  <text x="597" y="485" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#4CAF50">parameters</text>

  <rect x="650" y="470" width="85" height="35" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
  <text x="692" y="485" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#4CAF50">knowledge</text>

