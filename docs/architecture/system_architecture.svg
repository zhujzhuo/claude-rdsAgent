  <text x="560" y="102" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#2196F3">Celery Worker</text>
  <text x="560" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">任务执行</text>

