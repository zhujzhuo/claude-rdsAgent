  <rect x="490" y="210" width="120" height="65" fill="#FCE4EC" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="550" y="225" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#C2185B">HermesAgent</text>
  <text x="550" y="240" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">原生工具调用</text>
  <text x="550" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">自动循环</text>
  <text x="550" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">OpenAI格式</text>

  <rect x="620" y="210" width="110" height="65" fill="#FCE4EC" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="675" y="225" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#C2185B">HermesClient</text>
  <text x="675" y="240" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Ollama API</text>
  <text x="675" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Hermes 3</text>
  <text x="675" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">工具解析</text>

  <rect x="740" y="210" width="100" height="65" fill="#FCE4EC" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="790" y="225" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#C2185B">ToolRegistry</text>
