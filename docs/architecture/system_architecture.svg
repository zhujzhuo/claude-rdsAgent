  <text x="555" y="218" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">InspectionTask</text>
  <text x="555" y="233" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">TaskExecution</text>
  <text x="555" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">AlertRule/Event</text>

