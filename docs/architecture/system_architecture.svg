  <rect x="590" y="665" width="180" height="40" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
  <text x="680" y="680" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="12" fill="#E91E63">Embeddings</text>
  <text x="680" y="695" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">nomic-embed-text</text>

