  <rect x="610" y="435" width="150" height="40" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
  <text x="685" y="450" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#FF9800">Vector Store</text>
  <text x="685" y="465" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">ChromaDB知识库</text>

  <rect x="780" y="435" width="110" height="40" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
