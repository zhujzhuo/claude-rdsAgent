  <rect x="30" y="400" width="780" height="70" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="5"/>
  <text x="50" y="420" font-family="Arial" font-weight="bold" font-size="11" fill="#333">颜色说明:</text>

  <rect x="50" y="435" width="16" height="12" fill="#E91E63" rx="2"/>
  <text x="70" y="443" font-family="Arial" font-size="10" fill="#333">core - 问答Agent</text>

  <rect x="160" y="435" width="16" height="12" fill="#9C27B0" rx="2"/>
  <text x="180" y="443" font-family="Arial" font-size="10" fill="#333">diagnostic - 诊断Agent</text>

  <rect x="290" y="435" width="16" height="12" fill="#00BCD4" rx="2"/>
  <text x="310" y="443" font-family="Arial" font-size="10" fill="#333">scheduler - Django App</text>

  <rect x="420" y="435" width="16" height="12" fill="#3F51B5" rx="2"/>
  <text x="440" y="443" font-family="Arial" font-size="10" fill="#333">django_project</text>

  <rect x="550" y="435" width="16" height="12" fill="#4CAF50" rx="2"/>
  <text x="570" y="443" font-family="Arial" font-size="10" fill="#333">tools - 工具层</text>

  <rect x="650" y="435" width="16" height="12" fill="#FF9800" rx="2"/>
  <text x="670" y="443" font-family="Arial" font-size="10" fill="#333">External</text>

  <rect x="730" y="435" width="16" height="12" fill="#FF5722" rx="2"/>
  <text x="750" y="443" font-family="Arial" font-size="10" fill="#333">Celery</text>

  <!-- Stats -->
  <text x="750" y="465" text-anchor="end" font-family="Arial" font-size="10" fill="#666">总计: 8个模块 | 50+文件</text>

  <!-- Data Flow Section -->
  <rect x="30" y="490" width="780" height="90" fill="#E3F2FD" stroke="#1976D2" stroke-width="1" rx="5"/>
  <text x="50" y="510" font-family="Arial" font-weight="bold" font-size="12" fill="#1565C0">数据流程:</text>

  <rect x="70" y="520" width="80" height="50" fill="#fff" stroke="#1976D2" stroke-width="1" rx="3"/>
  <text x="110" y="535" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#1565C0">1. API请求</text>
  <text x="110" y="550" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Django ViewSet</text>

  <rect x="170" y="520" width="80" height="50" fill="#fff" stroke="#1976D2" stroke-width="1" rx="3"/>
  <text x="210" y="535" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#1565C0">2. 任务调度</text>
  <text x="210" y="550" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Celery Beat</text>

  <rect x="270" y="520" width="80" height="50" fill="#fff" stroke="#1976D2" stroke-width="1" rx="3"/>
  <text x="310" y="535" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#1565C0">3. 任务执行</text>
  <text x="310" y="550" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Celery Worker</text>

  <rect x="370" y="520" width="80" height="50" fill="#fff" stroke="#1976D2" stroke-width="1" rx="3"/>
  <text x="410" y="535" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#1565C0">4. Agent诊断</text>
  <text x="410" y="550" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">DiagnosticAgent</text>

  <rect x="470" y="520" width="80" height="50" fill="#fff" stroke="#1976D2" stroke-width="1" rx="3"/>
  <text x="510" y="535" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#1565C0">5. 告警检查</text>
  <text x="510" y="550" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">AlertService</text>

  <rect x="570" y="520" width="80" height="50" fill="#fff" stroke="#1976D2" stroke-width="1" rx="3"/>
  <text x="610" y="535" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#1565C0">6. 存储历史</text>
  <text x="610" y="550" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">MySQL + Django</text>

  <rect x="670" y="520" width="80" height="50" fill="#fff" stroke="#1976D2" stroke-width="1" rx="3"/>
