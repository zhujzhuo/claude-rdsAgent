  <rect x="270" y="185" width="170" height="80" fill="#fff" stroke="#666" stroke-width="1" rx="5"/>
  <rect x="270" y="185" width="170" height="18" fill="#9C27B0" rx="5"/>
  <text x="355" y="198" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="#fff">诊断Agent</text>
  <text x="355" y="218" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">13项检查</text>
  <text x="355" y="233" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">结果分析</text>
  <text x="355" y="248" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">报告生成</text>

